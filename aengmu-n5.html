<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>앵무 JLPT N5 — 매일 조금씩 일본어</title>
<style>
/* 페이퍼로지 (이주임 X 김도균) — 한글·영문 콜라보 폰트 */
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');font-weight:800;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap}
:root{
  --paper:#F2F5FA; --card:rgba(255,255,255,.6); --ink:#1C2033; --ink-soft:#697089;
  --beak:#FF7A45; --beak-deep:#E05E2B; --leaf:#58B94C; --leaf-deep:#3E9A34;
  --sky:#3FA7E0; --heart:#FF4B6E; --gold:#FFB02E; --line:rgba(110,120,160,.2);
  --wrong:rgba(255,75,110,.14); --right:rgba(88,185,76,.16); --radius:22px;
  --glass:rgba(255,255,255,.5); --glass-brd:1.5px solid rgba(255,255,255,.95);
  --glass-shadow:0 14px 34px rgba(22,28,52,.1), inset 0 1.5px 0 rgba(255,255,255,.98), inset 0 -1.5px 0 rgba(115,125,155,.16);
  --blur:blur(22px) saturate(180%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Paperlogy',-apple-system,BlinkMacSystemFont,"SF Pro Text","Apple SD Gothic Neo","Pretendard","Noto Sans KR","Hiragino Sans",sans-serif;
  letter-spacing:-.014em;
  color:var(--ink); overscroll-behavior:none;
  background:
    radial-gradient(1100px 760px at 18% 115%, rgba(255,255,255,.95), transparent 60%),
    radial-gradient(900px 620px at 92% -12%, rgba(255,255,255,.7), transparent 55%),
    linear-gradient(155deg,#F3F4F7 0%,#EAECF1 55%,#E3E6EC 100%);
  background-attachment:fixed;
}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
.btn{
  display:block;width:100%;padding:15px 18px;border-radius:999px;
  font-size:17px;font-weight:700;letter-spacing:-.01em;text-align:center;
  color:#fff;border:1.5px solid rgba(255,255,255,.5);
  background:linear-gradient(140deg, rgba(255,122,69,.96), rgba(224,94,43,.9));
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  box-shadow:0 10px 26px rgba(224,94,43,.32), inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .14s, box-shadow .14s, opacity .14s;
}
.btn:active{transform:scale(.97);box-shadow:0 4px 12px rgba(224,94,43,.28)}
.btn.green{background:linear-gradient(140deg, rgba(88,185,76,.96), rgba(62,154,52,.9));box-shadow:0 10px 26px rgba(62,154,52,.3), inset 0 1px 0 rgba(255,255,255,.5)}
.btn.green:active{box-shadow:0 4px 12px rgba(62,154,52,.26)}
.btn.ghost{background:var(--glass);color:var(--ink-soft);border:var(--glass-brd);box-shadow:var(--glass-shadow)}
.btn.ghost:active{box-shadow:0 4px 12px rgba(31,38,80,.1)}
.btn:disabled{background:rgba(190,198,216,.55);box-shadow:none;color:rgba(255,255,255,.95);cursor:default;border:1.5px solid rgba(255,255,255,.5)}
.btn:disabled:active{transform:none}
header{position:sticky;top:0;z-index:10;background:rgba(247,249,253,.55);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px}
.stat{display:flex;align-items:center;gap:5px;font-weight:800;font-size:16px}
.stat .ico{font-size:19px}
.stat.streak{color:var(--beak)} .stat.gem{color:var(--gold)} .stat.hp{color:var(--heart)}
.brand{font-size:19px;font-weight:900;letter-spacing:-.02em}
.brand span{color:var(--beak)}
.quest{margin:6px 18px 2px;background:var(--glass);border:var(--glass-brd);border-radius:var(--radius);padding:14px 16px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--glass-shadow)}
.quest h3{font-size:14px;color:var(--ink-soft);font-weight:800;margin-bottom:8px}
.quest .bar{height:14px;background:rgba(120,135,175,.18);border-radius:7px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(31,38,80,.12)}
.quest .bar i{display:block;height:100%;background:var(--gold);border-radius:7px;transition:width .5s}
.quest .num{font-size:13px;font-weight:800;color:var(--gold);margin-top:6px;text-align:right}
.unit-band{margin:20px 18px 4px;padding:14px 18px;border-radius:var(--radius);color:#fff;display:flex;justify-content:space-between;align-items:center;border:1.5px solid rgba(255,255,255,.45);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:0 10px 30px rgba(31,38,80,.18), inset 0 1px 0 rgba(255,255,255,.35)}
.unit-band h2{font-size:16.5px;font-weight:900}
.unit-band p{font-size:12.5px;opacity:.9;margin-top:2px}
.unit-band .tag{font-size:11px;font-weight:900;background:rgba(255,255,255,.25);padding:4px 9px;border-radius:99px}
.path{display:flex;flex-direction:column;align-items:center;padding:14px 0 30px}
.node-row{width:100%;display:flex;justify-content:center;padding:12px 0 32px}
.node{width:76px;height:72px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--glass);box-shadow:var(--glass-shadow);border:var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);transition:transform .14s}
.node.open{border:none;color:#fff}
.node.open:active{transform:scale(.93)}
.node.done::after{content:"✓";position:absolute;right:-4px;top:-4px;width:24px;height:24px;border-radius:50%;background:var(--gold);color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2.5px solid var(--paper)}
.node.locked{filter:grayscale(1);opacity:.55}
.node .lbl{position:absolute;bottom:-32px;font-size:12.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;letter-spacing:-.01em}
.node-row.l{transform:translateX(-52px)} .node-row.r{transform:translateX(52px)}
/* ==== 한자 마스터 원형 노드 (5스텝 진행 링) ==== */
.knode{position:relative;width:86px;height:86px;border-radius:50%;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:32px;border:var(--glass-brd);box-shadow:var(--glass-shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);transition:transform .14s}
.knode:active{transform:scale(.93)}
.knode svg{position:absolute;inset:-9px;width:calc(100% + 18px);height:calc(100% + 18px);pointer-events:none}
.knode svg circle{transition:stroke-dasharray .6s}
.knode .lbl{position:absolute;bottom:-38px;font-size:12.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;letter-spacing:-.01em}
.knode.alldone{background:rgba(255,246,227,.65);box-shadow:0 10px 30px rgba(216,168,43,.35), inset 0 1px 0 rgba(255,255,255,.8)}
.bigring{position:relative;width:150px;height:150px}
.bigring svg{width:100%;height:100%}
.bigring svg circle{transition:stroke-dasharray .6s}
.bigring .ringtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:36px;line-height:1.15;gap:2px}
.bigring .ringtxt b{font-size:17px;color:var(--gold);letter-spacing:.02em}
.kstep{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;background:var(--glass);border:var(--glass-brd);box-shadow:var(--glass-shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);font-size:15.5px;font-weight:800;text-align:left;width:100%;transition:transform .06s}
.kstep:active{transform:scale(.98);box-shadow:0 4px 12px rgba(31,38,80,.1)}
.kstep.done{border:1.5px solid rgba(255,176,46,.65);box-shadow:0 8px 26px rgba(255,176,46,.22), inset 0 1px 0 rgba(255,255,255,.8);background:rgba(255,246,227,.55)}
.kstep .go{font-size:13px;font-weight:900;color:var(--beak);flex:none}
.kstep.done .go{color:#D99A1B}
.kstep .sub{font-size:12.5px;color:var(--ink-soft);font-weight:700;margin-top:2px}
.mascot{display:flex;gap:10px;align-items:flex-end;margin:8px 18px 0}
.mascot .bird{width:62px;height:62px;border-radius:50%;border:2px solid rgba(255,255,255,.9);box-shadow:0 8px 20px rgba(22,28,52,.16);flex:none;transform:scaleX(-1);object-fit:cover}
.mascot .bubble{background:var(--glass);border:var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;font-size:14px;font-weight:700;color:var(--ink-soft)}
.lesson-top{display:flex;align-items:center;gap:12px;padding:16px 18px 6px}
.lesson-top .x{font-size:22px;color:var(--ink-soft);font-weight:800;padding:4px 8px}
.pbar{flex:1;height:16px;background:rgba(120,135,175,.18);border-radius:8px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(31,38,80,.12)}
.pbar i{display:block;height:100%;width:0;background:var(--leaf);border-radius:8px;transition:width .4s}
.hearts{font-weight:900;color:var(--heart);font-size:16px}
.stage{flex:1;padding:18px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.qtype{font-size:13px;font-weight:900;color:var(--sky);letter-spacing:.05em}
.prompt{font-size:25px;font-weight:900;line-height:1.4;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.prompt .rd{font-size:15px;color:var(--ink-soft);font-weight:700}
.subq{font-size:16px;font-weight:800;color:var(--ink-soft);margin-top:-6px}
.speak{width:52px;height:52px;border-radius:16px;background:linear-gradient(140deg, rgba(63,167,224,.96), rgba(46,134,184,.9));color:#fff;font-size:24px;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 8px 22px rgba(46,134,184,.35), inset 0 1px 0 rgba(255,255,255,.5);flex:none;display:flex;align-items:center;justify-content:center;transition:transform .14s}
.speak:active{transform:scale(.93)}
.speak.big{width:100px;height:88px;font-size:40px;margin:8px auto}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 16px;border-radius:14px;background:var(--glass);border:var(--glass-brd);box-shadow:var(--glass-shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);font-size:18px;font-weight:700;text-align:left;transition:all .08s}
.opt.sel{border:1.5px solid var(--sky);box-shadow:0 8px 22px rgba(63,167,224,.28);background:rgba(63,167,224,.16);color:#1B7FBE}
.opt.correct{border:1.5px solid var(--leaf);box-shadow:0 8px 22px rgba(88,185,76,.28);background:rgba(88,185,76,.18);color:var(--leaf-deep)}
.opt.wrong{border:1.5px solid var(--heart);box-shadow:0 8px 22px rgba(255,75,110,.26);background:rgba(255,75,110,.15);color:#D63158}
.passage{background:var(--glass);border:var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:14px;padding:14px 16px;font-size:16.5px;line-height:1.9;font-weight:600}
.answer-line{min-height:88px;border-bottom:2px solid var(--line);display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;padding-bottom:10px}
.bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{padding:10px 14px;border-radius:12px;background:var(--glass);border:var(--glass-brd);box-shadow:var(--glass-shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);font-size:16px;font-weight:700}
.chip:active{transform:scale(.95)}
.chip.used{visibility:hidden}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mcell{padding:16px 8px;border-radius:14px;background:var(--glass);border:var(--glass-brd);box-shadow:var(--glass-shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);font-size:16px;font-weight:700;text-align:center}
.mcell.sel{border:1.5px solid var(--sky);box-shadow:0 8px 22px rgba(63,167,224,.28);background:rgba(63,167,224,.14);color:#1B7FBE}
.mcell.paired{opacity:.35;pointer-events:none;border-color:var(--leaf)}
.mcell.shake{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.type-in{width:100%;padding:16px;border-radius:16px;border:var(--glass-brd);font-size:17px;font-family:inherit;min-height:96px;resize:none;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--glass-shadow)}
.type-in:focus{outline:none;border-color:var(--sky)}
.foot{padding:16px 18px calc(18px + env(safe-area-inset-bottom));background:rgba(255,255,255,.55);border:1.5px solid rgba(255,255,255,.9);border-bottom:none;border-radius:28px 28px 0 0;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:0 -12px 32px rgba(22,28,52,.08), inset 0 1.5px 0 rgba(255,255,255,.95)}
.foot.right{background:rgba(88,185,76,.22);border-color:transparent}
.foot.wrong{background:rgba(255,75,110,.18);border-color:transparent}
/* ==== 종료 확인 모달 (confirm 대체) ==== */
.ov{position:fixed;inset:0;background:rgba(20,24,48,.3);display:flex;align-items:center;justify-content:center;z-index:60;padding:24px;backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%)}
.modal{background:rgba(255,255,255,.72);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:var(--glass-brd);border-radius:26px;padding:22px 20px 18px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(10,14,40,.35);animation:pop .28s}
.modal h3{font-size:17.5px;font-weight:900;margin:8px 0 5px}
.modal p{font-size:14px;color:var(--ink-soft);font-weight:600;margin-bottom:16px;line-height:1.55}
.modal .row{display:flex;gap:10px}
.modal .btn{padding:12px;font-size:15.5px}
.fb{margin-bottom:12px}
.fb h4{font-size:19px;font-weight:900}
.fb.right h4{color:var(--leaf-deep)} .fb.wrong h4{color:var(--heart)}
.fb p{font-size:15px;font-weight:600;margin-top:3px;color:var(--ink)}
.center-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:10px}
.center-screen .big-emoji{font-size:76px;animation:pop .5s}
@keyframes pop{0%{transform:scale(.3)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.center-screen h1{font-size:26px;font-weight:900}
.center-screen p{color:var(--ink-soft);font-weight:600;font-size:15px}
.medals{display:flex;gap:12px;margin:18px 0}
.medal{background:var(--glass);border:var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:16px;padding:12px 18px;min-width:96px}
.medal .v{font-size:22px;font-weight:900}
.medal .k{font-size:12px;font-weight:800;color:var(--ink-soft);margin-top:2px}
.medal.xp .v{color:var(--gold)} .medal.acc .v{color:var(--leaf)} .medal.stk .v{color:var(--beak)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:rgba(28,32,51,.72);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.hidden{display:none!important}
/* ==== Liquid Glass 아이콘 · 마스코트 ==== */
.nico{width:30px;height:30px;display:block}
.njp{font-weight:800;line-height:1;display:block;letter-spacing:0}
.node .nico{width:29px;height:29px}
.node .njp{font-size:27px}
.node .nico,.node .njp,.knode .nico,.knode .njp{filter:drop-shadow(0 1px 2px rgba(0,0,0,.14))}
.unit-band .nico{width:17px;height:17px;display:inline-block;vertical-align:-3px;margin-right:3px}
.unit-band .njp{display:inline;font-size:15px}
.knode{color:#C9971C}
.knode .nico{width:34px;height:34px}
.knode .njp{font-size:30px}
.kstep .nico{width:16px;height:16px;display:inline-block;vertical-align:-2.5px;color:var(--gold)}
.kstep .njp{display:inline;font-size:15px;color:#C9971C}
.bigring .ringtxt .nico{width:46px;height:46px;color:var(--gold)}
.bigring .ringtxt .njp{font-size:40px;color:#C9971C}
.ico-spk{width:1em;height:1em;display:inline-block;vertical-align:-.14em}
.speak .ico-spk{width:24px;height:24px}
.speak.big .ico-spk{width:40px;height:40px}
.bird-lg{width:106px;height:106px;border-radius:50%;border:3px solid rgba(255,255,255,.95);box-shadow:0 14px 34px rgba(22,28,52,.2);object-fit:cover}
/* ==== 수업(학습) 카드 ==== */
.teach-title{font-size:22px;font-weight:900;line-height:1.35}
.teach-rule{font-size:15px;font-weight:600;line-height:1.8;color:var(--ink);background:var(--glass);border:var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:14px;padding:13px 15px}
.teach-rule b{color:var(--beak-deep)}
.cmp{background:var(--glass);border:var(--glass-brd);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:14px;overflow:hidden}
.cmp-row{display:grid;grid-template-columns:92px 1fr;column-gap:12px;row-gap:2px;padding:11px 13px;border-top:1.5px solid var(--line);align-items:center}
.cmp-row:first-child{border-top:none}
.cmp-k{grid-row:span 2;font-size:12px;font-weight:900;color:#fff;background:var(--sky);border-radius:8px;padding:6px 4px;text-align:center;line-height:1.3}
.cmp-j{font-size:16.5px;font-weight:800;cursor:pointer;line-height:1.4}
.cmp-j .ng{color:var(--heart)}
.cmp-m{font-size:13.5px;color:var(--ink-soft);font-weight:600}
.exbox{background:rgba(63,167,224,.13);border:1.5px solid rgba(63,167,224,.35);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:14px;padding:12px 14px}
.exbox .ej{font-weight:800;font-size:16px;cursor:pointer;line-height:1.6}
.exbox .ek{font-size:13.5px;color:var(--ink-soft);font-weight:600;margin-top:3px}
.tipbox{background:rgba(255,176,46,.16);border:1.5px solid rgba(255,176,46,.4);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:14px;padding:12px 14px;font-size:14px;font-weight:700;line-height:1.65}
.teach-tag{font-size:13px;font-weight:900;color:var(--sky);letter-spacing:.03em}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ==================== JLPT N5 코스 데이터 (교재 01~14과 기반) ==================== */
/* 어휘 항목: [일본어, 읽기(없으면 null), [한국어 뜻...]] */
const COURSE = [
 { title:"어휘 문법 기초", color:"#58B94C", deep:"#3E9A34", emoji:"🈶", icon:"vocab1",
   lessons:[
    { name:"명사", kind:"vocab", items:[
      ["私","わたし",["나","저"]],["人","ひと",["사람"]],["今日","きょう",["오늘"]],
      ["明日","あした",["내일"]],["友だち","ともだち",["친구","친구들"]],["本","ほん",["책"]],
      ["駅","えき",["역"]],["学校","がっこう",["학교"]],["学生","がくせい",["학생"]] ]},

/* 뜻이 겹치는 단어(先/前=앞 등)는 오답 후보에서 제외 */
function kmDistract(w,pool){
  const out=[],used=new Set(w[2]);
  for(const o of shuffle(pool)){
    if(o[0]===w[0])continue;
    if(o[2].some(m=>used.has(m)))continue;
    out.push(o);o[2].forEach(m=>used.add(m));
    if(out.length===3)break;
  }
  return out;
}

  const wq=shuffle(words).map(w=>{

    return {t:'choice',qt:'STEP ①  한자 단어 — 뜻 고르기',prompt:w[0],sub:'이 한자 단어의 뜻을 고르세요.',

/* ==================== 유틸 ==================== */
function dateKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function normKo(s){return s.replace(/[\s.,!?~〜、。]/g,'');}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200);}
let AC=null;
function sfx(ok){
  try{
    const Ctor=window.AudioContext||window.webkitAudioContext;
    if(!Ctor)return;
    AC=AC||new Ctor();
    const t=AC.currentTime;
    const tone=(f,st,d,type,g)=>{const o=AC.createOscillator(),v=AC.createGain();o.type=type||'sine';o.frequency.value=f;
      v.gain.setValueAtTime(g||0.12,t+st);v.gain.exponentialRampToValueAtTime(0.001,t+st+d);
      o.connect(v);v.connect(AC.destination);o.start(t+st);o.stop(t+st+d);};
    if(ok){tone(659,0,.12);tone(880,.1,.22);}
    else{tone(220,0,.22,'square',0.07);tone(155,.12,.3,'square',0.07);}
  }catch(e){}
}
function speak(text){
  if(!text)return;
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=0.85;
    speechSynthesis.speak(u);
  }catch(e){}
}
function updateStreakOnClear(){
  const now=new Date(),today=dateKey(now);
  if(S.lastStudyDate===today)return false;
  const yest=dateKey(new Date(now.getTime()-86400000));
  S.streak=S.lastStudyDate===yest?S.streak+1:1;
  S.lastStudyDate=today;return true;
}
function streakAlive(){
  if(!S.lastStudyDate)return false;
  const now=new Date();
  return S.lastStudyDate===dateKey(now)||S.lastStudyDate===dateKey(new Date(now.getTime()-86400000));
}
function xpToday(){
  const today=dateKey(new Date());
  if(S.xpTodayDate!==today){S.xpToday=0;S.xpTodayDate=today;}
  return S.xpToday;
}

/* ==================== 반복 암기 (SRS · 라이트너 박스) ==================== */
const SRS_STEPS=[10*60*1000, 4*3600*1000, 24*3600*1000, 3*24*3600*1000, 7*24*3600*1000, 14*24*3600*1000];
function srsUpdate(key, ok){
  if(!S.srs)S.srs={};
  const now=Date.now();
  const r=S.srs[key]||{box:0,due:0,seen:0,wrong:0};
  r.seen++;
  if(ok){r.box=Math.min(r.box+1,SRS_STEPS.length-1);}
  else{r.wrong++;r.box=0;}
  r.due=now+SRS_STEPS[r.box];
  S.srs[key]=r;
}
function srsDue(){
  if(!S.srs)return [];
  const now=Date.now();
  return Object.keys(S.srs).filter(k=>S.srs[k].due<=now);
}
function srsFind(jp){return VOCAB_POOL.find(v=>v[0]===jp);}
function buildReview(){
  const due=shuffle(srsDue());
  let keys=due.slice(0,8);
  if(keys.length<8){ // 대기 단어가 적으면 약한 단어(낮은 박스·오답 많은 순)로 보충
    const rest=Object.keys(S.srs||{}).filter(k=>!keys.includes(k))
      .sort((a,b)=>(S.srs[a].box-S.srs[b].box)||(S.srs[b].wrong-S.srs[a].wrong));
    keys=keys.concat(rest.slice(0,8-keys.length));
  }
  const its=keys.map(srsFind).filter(Boolean);
  if(its.length<4)return [];
  const ex=[];
  its.forEach((it,i)=>{
    const ds=vocabDistractors(it,3);
    const koE=`${vDisp(it)}는 ‘${it[2].join(', ')}’라는 뜻이에요.`;
    if(i%3===0){
      ex.push({t:'choice',qt:'뜻 고르기',prompt:vDisp(it),say:vSay(it),
        options:shuffle([it,...ds]).map(w=>w[2][0]),answer:it[2][0],srsKeys:[it[0]],explain:koE,
        optExplain:Object.fromEntries(ds.map(d=>[d[2][0],`선택한 ‘${d[2][0]}’는 ${vDisp(d)}의 뜻이에요.`]))});
    }else if(i%3===1){
      ex.push({t:'choice',qt:'일본어로 고르기',prompt:`“${it[2].join(', ')}”`,
        options:shuffle([it,...ds]).map(vDisp),answer:vDisp(it),sayAfter:vSay(it),srsKeys:[it[0]],
        explain:`‘${it[2][0]}’는 일본어로 ${vDisp(it)}라고 해요.`,
        optExplain:Object.fromEntries(ds.map(d=>[vDisp(d),`선택한 ${vDisp(d)}는 ‘${d[2][0]}’라는 뜻이에요.`]))});
    }else{
      ex.push({t:'listen',sub:'듣고 알맞은 뜻을 고르세요.',say:vSay(it),
        options:shuffle([it,...ds]).map(w=>w[2][0]),answer:it[2][0],srsKeys:[it[0]],explain:koE,
        optExplain:Object.fromEntries(ds.map(d=>[d[2][0],`선택한 ‘${d[2][0]}’는 ${vDisp(d)}의 뜻이에요.`]))});
    }
  });
  ex.push({t:'match',title:'복습 — 단어와 뜻 연결',
    pairs:its.slice(0,4).map(it=>({l:vDisp(it),r:it[2][0],say:vSay(it)})),srsKeys:its.slice(0,4).map(it=>it[0])});
  return shuffle(ex);
}
/* ==================== 듣기 불가 모드 ==================== */
function delisten(e){
  if(e.t!=='listen')return e;
  if(e.srsKeys&&e.srsKeys.length){
    const it=srsFind(e.srsKeys[0]);
    if(it){
      const koOpts=!/[ぁ-ヶ一-龯ー]/.test(e.answer);
      if(koOpts) return Object.assign({},e,{t:'choice',qt:'뜻 고르기',prompt:vDisp(it),say:null,sub:null,noSpeak:true,deListened:true});
      return Object.assign({},e,{t:'choice',qt:'일본어로 고르기',prompt:`“${it[2].join(', ')}”`,say:null,sub:null,noSpeak:true,deListened:true});
    }
  }
  return Object.assign({},e,{t:'choice',qt:'스크립트 읽고 고르기',prompt:e.say,say:null,noSpeak:true,deListened:true});
}
function skipListening(){
  L.queue.shift();                 // 현재 문제는 카운트하지 않고 건너뜀
  L.total=Math.max(1,L.total-1);
  L.noAudio=true;
  L.queue=L.queue.map(delisten);   // 남은 듣기 문제를 읽기형으로 변환

  if(L.queue.length===0){renderResult();return;}
  renderExercise();
}

function logWrong(ex){
  if(!S.wrongLog)S.wrongLog=[];
  const snap={id:Date.now()+'-'+Math.floor(Math.random()*1e6),ts:Date.now(),t:ex.t};
  if(ex.t==='choice'||ex.t==='listen'){
    Object.assign(snap,{qt:ex.qt,prompt:ex.prompt,sub:ex.sub,passage:ex.passage,say:ex.say,
      options:ex.options.slice(),answer:ex.answer,sayAfter:ex.sayAfter,note:ex.note,srsKeys:ex.srsKeys});
  }else if(ex.t==='assemble'){
    Object.assign(snap,{ko:ex.ko,segs:ex.segs.slice(),accepts:ex.accepts.slice(),bank:ex.bank.slice(),sayAfter:ex.sayAfter});
  }else return; // match 등은 기록하지 않음
  // 같은 문제 중복 제거(정답 기준)
  S.wrongLog=S.wrongLog.filter(x=>!(x.answer===snap.answer&&x.prompt===snap.prompt&&x.ko===snap.ko));
  S.wrongLog.push(snap);
  if(S.wrongLog.length>30)S.wrongLog=S.wrongLog.slice(-30);
}
function wrongTitle(x){
  if(x.t==='assemble')return `[문장 만들기] ${x.ko}`;
  return `${x.qt?`[${x.qt}] `:x.t==='listen'?'[듣기] ':''}${x.prompt||'${SPK} '+(x.say||'')}`;
}

  const log=(S.wrongLog||[]);

  const exs=shuffle(log).slice(0,10).map(x=>{
    const e=Object.assign({},x,{wrongId:x.id});
    if(e.t==='choice'||e.t==='listen')e.options=shuffle(e.options);
    if(e.t==='assemble')e.bank=shuffle(e.bank);
    return e;
  });
  L={id:'wrongs',review:true,lesson:{name:'오답 다시 풀기'},queue:exs,done:0,total:exs.length,mistakes:0,checked:false,sel:null,mSel:null,mPaired:0};

}

/* ==================== 문제 생성 ==================== */
function vDisp(it){return it[1]?`${it[0]}(${it[1]})`:it[0];}
function vSay(it){return it[1]||it[0];}
function meaningsOverlap(a,b){return a.some(x=>b.includes(x));}
const VOCAB_POOL=COURSE.flatMap(u=>u.lessons.filter(l=>l.kind==='vocab').flatMap(l=>l.items));

function vocabDistractors(item,n){
  const cand=shuffle(VOCAB_POOL.filter(w=>w[0]!==item[0]&&!meaningsOverlap(w[2],item[2])));
  const out=[],seenJp=new Set([item[0]]),seenKo=new Set([item[2][0]]);
  for(const w of cand){
    if(seenJp.has(w[0])||seenKo.has(w[2][0]))continue;
    out.push(w);seenJp.add(w[0]);seenKo.add(w[2][0]);
    if(out.length===n)break;
  }
  return out;
}

function buildExercises(lesson){
  const ex=[];
  if(lesson.kind==='vocab'){
    const its=shuffle(lesson.items);
    const koExp=it=>`${vDisp(it)}는 ‘${it[2].join(', ')}’라는 뜻이에요.`;
    const jpExp=it=>`‘${it[2][0]}’는 일본어로 ${vDisp(it)}라고 해요.`;
    const mapKo=ds=>Object.fromEntries(ds.map(d=>[d[2][0],`선택한 ‘${d[2][0]}’는 ${vDisp(d)}의 뜻이에요.`]));
    const mapJp=ds=>Object.fromEntries(ds.map(d=>[vDisp(d),`선택한 ${vDisp(d)}는 ‘${d[2][0]}’라는 뜻이에요.`]));
    // 3문제: 일→한 뜻 고르기
    its.slice(0,3).forEach(it=>{
      const ds=vocabDistractors(it,3);
      const options=shuffle([it,...ds]).map(w=>w[2][0]);
      ex.push({t:'choice',qt:'뜻 고르기',prompt:vDisp(it),say:vSay(it),options,answer:it[2][0],srsKeys:[it[0]],
        explain:koExp(it),optExplain:mapKo(ds)});
    });
    // 2문제: 한→일
    its.slice(3,5).forEach(it=>{
      const ds=vocabDistractors(it,3);
      const options=shuffle([it,...ds]).map(vDisp);
      ex.push({t:'choice',qt:'일본어로 고르기',prompt:`“${it[2].join(', ')}”`,options,answer:vDisp(it),sayAfter:vSay(it),srsKeys:[it[0]],
        explain:jpExp(it),optExplain:mapJp(ds)});
    });
    // 듣고 단어 고르기
    const li=its[5];
    { const ds=vocabDistractors(li,3);
      ex.push({t:'listen',say:vSay(li),options:shuffle([li,...ds]).map(vDisp),answer:vDisp(li),srsKeys:[li[0]],
        explain:koExp(li),optExplain:mapJp(ds)}); }
    // 듣고 뜻 고르기 (타이핑 대체)
    const mi=its[6];
    { const ds=vocabDistractors(mi,3);
      ex.push({t:'listen',sub:'듣고 알맞은 뜻을 고르세요.',say:vSay(mi),
        options:shuffle([mi,...ds]).map(w=>w[2][0]),answer:mi[2][0],srsKeys:[mi[0]],
        explain:koExp(mi),optExplain:mapKo(ds)}); }
    // 짝 맞추기
    ex.push({t:'match',title:'단어와 뜻 연결',pairs:its.slice(0,4).map(it=>({l:vDisp(it),r:it[2][0],say:vSay(it)})),srsKeys:its.slice(0,4).map(it=>it[0])});
  }
  else if(lesson.kind==='conj'){
    // 매번 순서를 섞고, 절반 확률로 방향을 뒤집어(활용형 → 뜻 고르기) 다른 시험이 되게 함
    const phraseOf=it=>(it.q.match(/‘([^’]+)’/)||[])[1];
    shuffle(lesson.items).forEach(it=>{
      const ph=phraseOf(it);
      const others=[...new Set(lesson.items.filter(o=>o!==it).map(phraseOf).filter(p=>p&&p!==ph))];
      if(ph&&others.length>=3&&Math.random()<0.5){
        ex.push({t:'choice',qt:'무슨 뜻일까요?',
          prompt:it.a, say:it.a, sub:'이 활용형의 뜻을 고르세요.',
          options:shuffle([ph,...shuffle(others).slice(0,3)]),answer:ph,note:it.note,
          explain:`${it.a}는 ‘${ph}’라는 뜻이에요.`});
      }else{
        ex.push({t:'choice',qt:'활용형 고르기',
          prompt:it.r?`${it.b}(${it.r})`:it.b, sub:`${it.ko} → ${it.q}`,
          options:shuffle([it.a,...it.w]),answer:it.a,sayAfter:it.a,note:it.note});
      }
    });
    if(lesson.match){
      ex.push({t:'match',title:lesson.match.title,pairs:lesson.match.pairs.map(p=>({l:p[0],r:p[1],say:p[1].match(/[ぁ-んァ-ン一-龯]/)?p[1]:p[0]}))});
    }
  }
  else if(lesson.kind==='group'){
    shuffle(lesson.items).forEach(it=>{
      ex.push({t:'choice',qt:'몇 그룹 동사일까요?',
        prompt:it.r?`${it.b}(${it.r})`:it.b, sub:it.ko, say:it.r||it.b,
        options:['1그룹','2그룹','3그룹'],answer:it.a,note:it.note});
    });
  }
  else if(lesson.kind==='quiz'){
    // 매번 순서를 섞고, 문항이 많은 레슨은 6문제를 무작위 추출 → 응시마다 구성이 달라짐
    shuffle(lesson.items).slice(0,6).forEach(it=>{
      ex.push({t:'choice',qt:lesson.qt||'알맞은 것 고르기',prompt:it.p,sub:it.sub,
        options:shuffle([it.a,...it.w]),answer:it.a,
        sayAfter:it.sayAfter||(lesson.noSpeak?it.a:undefined),
        note:it.note,explain:it.expl,noSpeak:lesson.noSpeak||it.noSpeak});
    });
    if(lesson.match){
      ex.push({t:'match',title:lesson.match.title,pairs:lesson.match.pairs.map(p=>({l:p[0],r:p[1],say:p[0]}))});
    }
  }
  else if(lesson.kind==='read'){
    shuffle(lesson.items).forEach(it=>{
      ex.push({t:'choice',qt:'지문을 읽고 답하기',passage:it.passage,prompt:it.q,
        options:shuffle([it.a,...it.w]),answer:it.a,note:it.note,explain:it.expl});
    });
  }
  else if(lesson.kind==='listenq'){
    shuffle(lesson.items).forEach(it=>{
      ex.push({t:'listen',sub:it.sub,say:it.say,
        options:shuffle([it.a,...it.w]),answer:it.a,note:it.note,explain:it.expl});
    });
  }
  else if(lesson.kind==='assemble'){
    shuffle(lesson.items).forEach(it=>{
      ex.push({t:'assemble',ko:it.ko,segs:it.segs,
        accepts:[it.segs,...(it.alts||[])].map(a=>a.join('')),
        bank:shuffle([...it.segs,...(it.extra||[])]),sayAfter:it.segs.join('')});
    });
  }
  else if(lesson.kind==='kanji'){
    // 문자·어휘: ① 한자 단어 뜻 고르기 → ② 문장 속 【 】 읽기 고르기
    const part=KUNIT[lesson.step];
    // 오답도 같은 품사에서만 뽑기 (명사↔명사, 동사↔동사, 형용사↔형용사)
    const posPool=KUNIT.filter(p=>p.pos===part.pos).flatMap(p=>p.items.map(x=>x.w));
    const clean=s=>s.replace(/[【】]/g,'');
    const wq=shuffle(part.items).map(({w})=>{
      const ds=kmDistract(w,posPool);
      return {t:'choice',qt:'① 한자 단어 — 뜻 고르기',prompt:w[0],sub:'이 한자 단어의 뜻을 고르세요.',
        options:shuffle([w[2][0],...ds.map(d=>d[2][0])]),answer:w[2][0],sayAfter:w[1],noSpeak:true,
        explain:`${w[0]}(${w[1]})는 ‘${w[2].join(', ')}’라는 뜻이에요.`,
        optExplain:Object.fromEntries(ds.map(d=>[d[2][0],`선택한 ‘${d[2][0]}’는 ${d[0]}(${d[1]})의 뜻이에요.`]))};
    });
    const sq=shuffle(part.items).map(({s})=>({t:'choice',qt:'② 문장 읽기 — 【 】 안 단어의 올바른 읽기는?',prompt:s[0],
      sub:s[4],options:shuffle([s[1],...s[2]]),answer:s[1],
      sayAfter:clean(s[0]),          // 정답 시 문장 전체를 읽어줌
      explain:s[3],transl:s[4],noSpeak:true}));  // 정답 시 해설 + 문장 전체 해석
    return [...wq,...sq]; // 단어를 모두 익힌 뒤 → 문장 실전 (순서 유지)
  }
  else if(lesson.kind==='hyoki'){
    // 표기: ① 발음 → 올바른 표기 고르기 → ② 문장 속 【 】 안 말의 올바른 표기 고르기
    const part=HUNIT[lesson.step];
    const clean=s=>s.replace(/[【】]/g,'');
    const wq=shuffle(part.items).map(it=>({t:'choice',qt:'① 단어 표기 — 올바른 한자·가타카나는?',
      prompt:it.r, sub:`뜻: ${it.k} · 이 발음의 올바른 표기를 고르세요.`,
      options:shuffle([it.w,...it.d]), answer:it.w, noSpeak:true, sayAfter:it.r,
      explain:`「${it.r}」의 올바른 표기는 「${it.w}」(${it.k})예요.`, note:it.n}));
    const sq=shuffle(part.items).map(it=>({t:'choice',qt:'② 문장 표기 — 【 】 안 말의 올바른 표기는?',
      prompt:it.s, sub:it.t,
      options:shuffle([it.w,...it.d]), answer:it.w, noSpeak:true, sayAfter:clean(it.s),
      explain:`「${it.r}」 → 「${it.w}」(${it.k})`, transl:it.t, note:it.n}));
    return [...wq,...sq]; // 단어를 모두 익힌 뒤 → 문장 실전 (순서 유지)
  }
  else if(lesson.kind==='mock'){
    let pool=[];
    lesson.src.forEach(id=>{
      const ui=+id.match(/u(\d+)/)[1], li=+id.match(/l(\d+)/)[1];
      pool=pool.concat(buildExercises(COURSE[ui].lessons[li]).filter(e=>e.t==='choice'||e.t==='listen'||e.t==='assemble'));
    });
    return shuffle(pool).slice(0,10);
  }
  return shuffle(ex);
}

/* confirm() 대체 — 샌드박스에서도 동작하는 앱 내 종료 확인 모달 */
function askQuit(msg){
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="modal">
    <h3>레슨을 그만둘까요?</h3>
    <p>${esc(msg||'지금 나가면 이번 레슨 진행 내용은 저장되지 않아요.')}</p>
    <div class="row">
      <button class="btn ghost" id="mStay">계속하기</button>
      <button class="btn" id="mQuit" style="background:linear-gradient(140deg, rgba(255,75,110,.95), rgba(201,51,85,.9));box-shadow:0 8px 22px rgba(201,51,85,.35)">나가기</button>
    </div></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mStay').onclick=()=>ov.remove();
  ov.querySelector('#mQuit').onclick=()=>{ov.remove();(L&&/^km\d$/.test(L.id))?renderKanjiHub():renderHome();};
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

/* ==================== 수업(학습) 렌더링 ==================== */
function teachSay(s){return s.replace(/[（(][^)）]*[)）]/g,'').replace(/✗|○|★/g,'').replace(/[→・]/g,'、');}
function renderTeach(i){
  const cards=TEACH[L.id], c=cards[i];
  const rows=(c.rows||[]).map(r=>{
    const bad=/✗/.test(r[1]);
    return `<div class="cmp-row">
      <div class="cmp-k" ${bad?'style="background:var(--heart)"':''}>${esc(r[0])}</div>
      <div class="cmp-j ${bad?'ng':''}" ${bad?'':`data-say="${esc(teachSay(r[1]))}"`}>${esc(r[1])}${bad?'':' '+SPK}</div>
      <div class="cmp-m">${esc(r[2])}</div>
    </div>`;}).join('');
  app.innerHTML=`
    <div class="lesson-top">
      <button class="x" id="quit">✕</button>
      <div class="pbar"><i style="width:${(i+1)/cards.length*100}%;background:var(--sky)"></i></div>
      <div class="teach-tag">수업 ${i+1}/${cards.length}</div>
    </div>
    <div class="stage">
      <div class="qtype">📖 수업 — ${esc(L.lesson.name)}</div>
      <div class="teach-title">${esc(c.title)}</div>
      ${c.rule?`<div class="teach-rule">${esc(c.rule)}</div>`:''}
      ${rows?`<div class="cmp">${rows}</div>`:''}
      ${c.ex?`<div class="exbox"><div class="ej" data-say="${esc(c.ex[0])}">${esc(c.ex[0])} ${SPK}</div><div class="ek">${esc(c.ex[1])}</div></div>`:''}
      ${c.tip?`<div class="tipbox">💡 ${esc(c.tip)}</div>`:''}
    </div>
    <div class="foot">
      <button class="btn ghost" id="skipTeach" style="margin-bottom:10px;padding:11px;font-size:14.5px">${i===0?'이미 알아요 — 바로 연습하기':'수업 건너뛰고 연습하기 →'}</button>
      <button class="btn green" id="tnext">${i===cards.length-1?'이제 연습해 볼까요? ✨':'다음'}</button>
    </div>`;
  document.getElementById('quit').onclick=renderHome; // 수업은 잃을 진행이 없으니 바로 나가기
  app.querySelectorAll('[data-say]').forEach(b=>b.onclick=()=>speak(b.dataset.say));
  document.getElementById('skipTeach').onclick=finishTeach;
  document.getElementById('tnext').onclick=()=>{ (i+1<cards.length)?renderTeach(i+1):finishTeach(); };
}
async function finishTeach(){
  const rec=S.lessons[L.id]||{clears:0};
  rec.taught=true; S.lessons[L.id]=rec;
  await saveState();
  renderExercise();
}
function renderLessonIntro(){
  app.innerHTML=`<div class="center-screen">
    <div class="big-emoji">📖</div>
    <h1>${esc(L.lesson.name)}</h1>
    <p>이 레슨은 수업을 이미 들었어요.<br>규칙을 다시 볼까요, 바로 연습할까요?</p>
    <div style="width:100%;max-width:320px;margin-top:14px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" id="teachAgain">📖 수업 다시 보기</button>
      <button class="btn green" id="goEx">🏃 바로 연습하기</button>
      <button class="btn ghost" id="goHome">← 홈으로</button>
    </div></div>`;
  document.getElementById('teachAgain').onclick=()=>renderTeach(0);
  document.getElementById('goEx').onclick=renderExercise;
  document.getElementById('goHome').onclick=renderHome;
}

/* ==================== 렌더링 ==================== */
const app=document.getElementById('app');
let L=null;
let homeScroll=0, focusId=null;   // 홈 스크롤 위치 기억 · 방금 끝낸 레슨으로 복귀

function renderHome(){
  const goal=Math.min(xpToday(),DAILY_GOAL);
  const clearedCount=id=>((S.lessons[id]||{}).clears||0);
  let pathHTML='';
  const zig=['','l','r'];
  COURSE.forEach((u,ui)=>{
    pathHTML+=`<div class="unit-band" style="background:linear-gradient(135deg, ${u.color}E8, ${u.deep}CC)">
      <div><h2>${NI[u.icon]} ${ui+1}단원 · ${u.title}</h2><p>레슨 ${u.lessons.length}개</p></div>
      <div class="tag">UNIT ${ui+1}</div></div><div class="path">`;
    u.lessons.forEach((l,li)=>{
      const id=`u${ui}l${li}`;
      const cleared=clearedCount(id)>0;
      pathHTML+=`<div class="node-row ${zig[li%3]}">
        <button class="node open ${cleared?'done':''}" style="background:linear-gradient(145deg, ${u.color}F0, ${u.deep}D9);border:1.5px solid rgba(255,255,255,.5);box-shadow:0 10px 26px ${u.deep}66, inset 0 1px 0 rgba(255,255,255,.45)" data-id="${id}">
          ${cleared?NI.star:NI[u.icon]}<span class="lbl">${TEACH[id]?'📖 ':''}${l.name}</span>
        </button></div>`;
    });
    pathHTML+='</div>';
  });
  const streakOK=streakAlive();
  app.innerHTML=`
    <header>
      <div class="brand">앵무 <span>N5</span></div>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="stat streak"><span class="ico">${streakOK?'🔥':'🪵'}</span>${S.streak}</div>
        <div class="stat gem"><span class="ico">⚡</span>${S.xp}</div>
        <button class="stat" id="memBtn" style="font-size:20px" title="학습 메모리">📒</button>
      </div>
    </header>
    <div class="mascot"><img class="bird" src="${BIRD}" alt="모란앵무">
      <div class="bubble">${
        goal>=DAILY_GOAL?'오늘 목표 달성! すごい! 🎉':
        streakOK&&S.lastStudyDate===dateKey(new Date())?'한 레슨 더 어때요? もう少し!':
        streakOK?`연속 ${S.streak}일! 오늘도 지켜요 🔥`:'JLPT N5, 매일 조금씩이 비결이에요!'
      }</div>
    </div>
    <div class="quest">
      <h3>🎯 오늘의 목표 — ${DAILY_GOAL} XP 모으기</h3>
      <div class="bar"><i style="width:${goal/DAILY_GOAL*100}%"></i></div>
      <div class="num">${goal} / ${DAILY_GOAL} XP</div>
    </div>
    <div class="quest">
      <h3>🔁 반복 암기 — 배운 단어 ${Object.keys(S.srs||{}).length}개 · 복습 대기 <span style="color:var(--beak)">${srsDue().length}개</span></h3>
      <button class="btn ${srsDue().length?'':'green'}" id="reviewBtn" style="margin-top:4px;padding:12px">${srsDue().length?`지금 복습하기 (${srsDue().length})`:'약한 단어 복습하기'}</button>
    </div>
    ${pathHTML}`;
  const rb=document.getElementById('reviewBtn'); if(rb)rb.onclick=startReview;
  const mb=document.getElementById('memBtn'); if(mb)mb.onclick=()=>renderMemory('log');
  app.querySelectorAll('.node[data-id]').forEach(b=>b.addEventListener('click',()=>startLesson(b.dataset.id)));
  // 레슨을 끝내고 돌아오면 맨 위로 튀지 않고, 방금 끝낸 레슨(또는 직전 스크롤 위치)으로 복귀
  requestAnimationFrame(()=>{
    if(focusId){
      const nd=app.querySelector(`.node[data-id="${focusId}"]`); focusId=null;
      if(nd){nd.scrollIntoView({block:'center'}); return;}
    }
    window.scrollTo(0, homeScroll);
  });
}

function startLesson(id){
  homeScroll=window.scrollY;   // 홈에서 떠날 때 스크롤 위치 저장
  const ui=+id.match(/u(\d+)/)[1], li=+id.match(/l(\d+)/)[1];
  const lesson=COURSE[ui].lessons[li];
  L={id,lesson,queue:buildExercises(lesson),done:0,total:0,mistakes:0,checked:false,sel:null,mSel:null,mPaired:0};
  L.total=L.queue.length;
  if(TEACH[id]){
    const rec=S.lessons[id]||{};
    if(!rec.taught){renderTeach(0);return;}   // 처음이면 수업부터
    renderLessonIntro();return;               // 들었으면 다시 보기/바로 연습 선택
  }
  renderExercise();
}

function renderExercise(){
  if(L.queue.length===0){renderResult();return;}
  const ex=L.queue[0];
  L.checked=false;L.sel=null;L.mSel=null;L.mPaired=0;

  let body='';
  if(ex.t==='choice'){
    const tapSay=ex.noSpeak?null:(ex.say||(/[ぁ-ヶ一-龯ー]/.test(ex.prompt||'')?ex.prompt.replace(/[【】“”]/g,''):null));
    body=`<div class="qtype">${esc(ex.qt)}${tapSay?' <span style="font-weight:700;color:var(--ink-soft)">· 문제를 누르면 발음 ${SPK}</span>':''}</div>
      ${ex.passage?`<div class="passage" data-say="${esc(ex.passage)}" style="cursor:pointer">${esc(ex.passage)}</div>`:''}
      <div class="prompt" ${ex.passage?'style="font-size:19px"':''}>${ex.say?`<button class="speak" data-say="${esc(ex.say)}">${SPK}</button>`:''}${tapSay?`<span data-say="${esc(tapSay)}" style="cursor:pointer">${esc(ex.prompt)}</span>`:esc(ex.prompt)}</div>
      ${ex.sub?`<div class="subq">${esc(ex.sub)}</div>`:''}
      <div class="opts">${ex.options.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o)}</button>`).join('')}</div>`;
  }else if(ex.t==='listen'){
    body=`<div class="qtype">듣고 고르기</div>
      <button class="speak big" data-say="${esc(ex.say)}">${SPK}</button>
      ${ex.sub?`<div class="subq" style="text-align:center">${esc(ex.sub)}</div>`:''}
      <div class="opts">${ex.options.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o)}</button>`).join('')}</div>
      <button class="btn ghost" id="noaudio" style="padding:11px;font-size:14.5px">🔇 지금은 들을 수 없어요</button>`;
  }else if(ex.t==='assemble'){
    body=`<div class="qtype">문장 만들기 ★ — 순서대로 배열하세요</div>
      <div class="prompt" style="font-size:19px">“${esc(ex.ko)}”</div>
      <div class="answer-line" id="ansline"></div>
      <div class="bank">${ex.bank.map((w,i)=>`<button class="chip" data-i="${i}">${esc(w)}</button>`).join('')}</div>`;
  }else if(ex.t==='match'){
    const left=shuffle(ex.pairs.map((p,i)=>({txt:p.l,k:i})));
    const right=shuffle(ex.pairs.map((p,i)=>({txt:p.r,k:i})));
    let cellsHTML='';
    for(let i=0;i<ex.pairs.length;i++){
      cellsHTML+=`<button class="mcell" data-k="${left[i].k}" data-side="l">${esc(left[i].txt)}</button>`;
      cellsHTML+=`<button class="mcell" data-k="${right[i].k}" data-side="r">${esc(right[i].txt)}</button>`;
    }
    body=`<div class="qtype">짝 맞추기</div>
      <div class="prompt" style="font-size:18px">${esc(ex.title)}</div>
      <div class="subq">왼쪽 🇯🇵 일본어 ↔ 오른쪽 뜻</div>
      <div class="match-grid">${cellsHTML}</div>`;
  }else if(ex.t==='type'){
    body=`<div class="qtype">${esc(ex.qt)}</div>
      <div class="prompt">${ex.say?`<button class="speak" data-say="${esc(ex.say)}">${SPK}</button>`:''}${esc(ex.prompt)}</div>
      <textarea class="type-in" id="typein" placeholder="한국어 뜻을 입력하세요" autocomplete="off"></textarea>`;
  }

  app.innerHTML=`
    <div class="lesson-top">
      <button class="x" id="quit">✕</button>
      <div class="pbar"><i style="width:${L.done/L.total*100}%"></i></div>
    </div>
    <div class="stage">${body}</div>
    <div class="foot" id="foot"><button class="btn green" id="check" disabled>확인</button></div>`;

  document.getElementById('quit').onclick=()=>askQuit();
  const na=document.getElementById('noaudio'); if(na)na.onclick=skipListening;
  const checkBtn=document.getElementById('check');
  app.querySelectorAll('[data-say]').forEach(b=>b.onclick=()=>speak(b.dataset.say));
  if(ex.t==='listen')setTimeout(()=>speak(ex.say),350);
  if(ex.t==='choice'&&ex.say)setTimeout(()=>speak(ex.say),350);

  if(ex.t==='choice'||ex.t==='listen'){
    app.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
      if(L.checked)return;
      app.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      b.classList.add('sel');L.sel=+b.dataset.i;checkBtn.disabled=false;
    });
  }
  if(ex.t==='match'){
    checkBtn.classList.add('hidden');
    app.querySelectorAll('.mcell').forEach(b=>b.onclick=()=>{
      if(b.classList.contains('paired'))return;
      if(!L.mSel){L.mSel=b;b.classList.add('sel');return;}
      if(L.mSel===b){b.classList.remove('sel');L.mSel=null;return;}
      if(L.mSel.dataset.side===b.dataset.side){L.mSel.classList.remove('sel');L.mSel=b;b.classList.add('sel');return;}
      if(L.mSel.dataset.k===b.dataset.k){
        L.mSel.classList.remove('sel');L.mSel.classList.add('paired');b.classList.add('paired');
        speak(ex.pairs[+b.dataset.k].say);
        L.mSel=null;L.mPaired++;
        if(L.mPaired===ex.pairs.length)onChecked(true,'');
      }else{
        const a=L.mSel;a.classList.remove('sel');
        a.classList.add('shake');b.classList.add('shake');
        setTimeout(()=>{a.classList.remove('shake');b.classList.remove('shake');},320);
        L.mSel=null;
      }
    });
  }
  if(ex.t==='type'){
    const ta=document.getElementById('typein');
    ta.oninput=()=>{checkBtn.disabled=ta.value.trim()==='';};
    ta.focus();
  }
  if(ex.t==='assemble'){
    L.picked=[];
    const line=document.getElementById('ansline');
    app.querySelectorAll('.bank .chip').forEach(b=>b.onclick=()=>{
      if(L.checked||b.classList.contains('used'))return;
      b.classList.add('used');
      const w=document.createElement('button');w.className='chip';w.textContent=b.textContent;
      w.onclick=()=>{if(L.checked)return;w.remove();b.classList.remove('used');L.picked=L.picked.filter(x=>x!==b);checkBtn.disabled=L.picked.length===0;};
      line.appendChild(w);L.picked.push(b);checkBtn.disabled=false;
    });
  }

  checkBtn.onclick=()=>{
    if(L.checked)return;
    let ok=false,correctText='';
    if(ex.t==='assemble'){
      const got=L.picked.map(b=>b.textContent).join('');
      ok=ex.accepts.includes(got);
      correctText=ex.segs.join(' ');
      if(ok&&ex.sayAfter)speak(ex.sayAfter);
    }else if(ex.t==='choice'||ex.t==='listen'){
      ok=ex.options[L.sel]===ex.answer;
      L.lastSel=ex.options[L.sel];
      correctText=ex.answer;
      const selBtn=app.querySelector('.opt.sel');
      selBtn.classList.add(ok?'correct':'wrong');
      if(!ok){const ci=ex.options.indexOf(ex.answer);app.querySelector(`.opt[data-i="${ci}"]`).classList.add('correct');}
      if(ok&&ex.sayAfter)speak(ex.sayAfter);
    }else if(ex.t==='type'){
      const got=document.getElementById('typein').value;
      ok=ex.accept.some(a=>normKo(a)===normKo(got));
      correctText=ex.answer;
    }
    onChecked(ok,correctText,ex.note);
  };

  function onChecked(ok,correctText,note){
    L.checked=true;
    const cur=L.queue.shift();
    if(cur.srsKeys){cur.srsKeys.forEach(k=>srsUpdate(k,ok));}
    if(!ok)logWrong(cur);
    if(ok&&cur.wrongId)clearWrong(cur.wrongId);
    if(cur.srsKeys||!ok||cur.wrongId)saveState();
    if(ok){L.done++;}
    else{L.mistakes++;L.queue.push(cur);}
    sfx(ok);
    const foot=document.getElementById('foot');
    foot.className='foot '+(ok?'right':'wrong');
    const wrongWhy=(!ok&&cur.optExplain&&cur.optExplain[L.lastSel])?cur.optExplain[L.lastSel]:'';
    foot.innerHTML=`<div class="fb ${ok?'right':'wrong'}">
        <h4>${ok?['いいね! 좋아요 🎉','正解! 정답 ✨','すごい! 완벽해요 🦜','よくできました! 💚'][Math.floor(Math.random()*4)]:'아쉬워요 💔'}</h4>
        ${ok?'':`<p>정답: ${esc(correctText)}</p>`}
        ${wrongWhy?`<p>${esc(wrongWhy)}</p>`:''}
        ${cur.explain?`<p>${esc(cur.explain)}</p>`:''}
        ${cur.transl?`<p>📖 ${esc(cur.transl)}</p>`:''}
        ${note?`<p>💡 ${esc(note)}</p>`:''}
      </div>
      <button class="btn ${ok?'green':''}" id="next">계속하기</button>`;
    app.querySelector('.pbar i').style.width=(L.done/L.total*100)+'%';
    document.getElementById('next').onclick=renderExercise;
    // 정답/오답 확인 후 화면이 맨 위로 튀지 않고, 방금 푼 문제(정답 표시)가 보이도록 유지
    document.getElementById('next').focus({preventScroll:true});
    const seen=app.querySelector('.opt.correct')||app.querySelector('.opt.sel')||app.querySelector('.prompt');
    if(seen)seen.scrollIntoView({block:'center',behavior:'smooth'});
  }
}

async function renderResult(){
  if(L.review){
    const xp=5+(L.mistakes===0?5:0);
    S.xp+=xp;xpToday();S.xpToday+=xp;
    const newDay=updateStreakOnClear();
    const acc=(L.done+L.mistakes)?Math.round(L.done/(L.done+L.mistakes)*100):100;
    await saveState();
    app.innerHTML=`<div class="center-screen">
      <div class="big-emoji">🔁</div>
      <h1>복습 완료!</h1>
      <p>${L.mistakes===0?'전부 기억하고 있었어요! 복습 간격이 늘어나요.':'틀린 단어는 첫 박스로 돌아가 곧 다시 나와요.'}</p>
      <div class="medals">
        <div class="medal xp"><div class="v">+${xp}</div><div class="k">XP</div></div>
        <div class="medal acc"><div class="v">${acc}%</div><div class="k">기억률</div></div>
        <div class="medal stk"><div class="v">📦${srsDue().length}</div><div class="k">남은 대기</div></div>
      </div>
      ${newDay?`<p style="color:var(--beak);font-weight:800">🔥 연속 학습 ${S.streak}일째!</p>`:''}
      <div style="width:100%;max-width:320px;margin-top:14px">
        <button class="btn green" id="home">계속하기</button>
      </div>
    </div>`;
    document.getElementById('home').onclick=renderHome;
    return;
  }
  const isKM=/^km\d$/.test(L.id);
  const rec=S.lessons[L.id]||{clears:0};
  const first=rec.clears===0;
  let xp=10+(first?5:0)+(L.mistakes===0?5:0)+(L.lesson.bonusXP||0)+(isKM&&first?5:0);
  rec.clears++;S.lessons[L.id]=rec;
  S.xp+=xp;xpToday();S.xpToday+=xp;
  const newDay=updateStreakOnClear();
  const acc=(L.done+L.mistakes)?Math.round(L.done/(L.done+L.mistakes)*100):100;
  await saveState();
  const kmN=kmCleared();
  app.innerHTML=`<div class="center-screen">
    <div class="big-emoji">${isKM?(kmN===5?'👑':'🈴'):`<img class="bird-lg" src="${BIRD}" alt="모란앵무">`}</div>
    <h1>${isKM?'STEP 클리어!':'レッスン 완료!'}</h1>
    <p>${L.mistakes===0?'실수 없이 완벽하게 끝냈어요':'틀린 문제도 끝까지 다시 풀었어요'}</p>
    <div class="medals">
      <div class="medal xp"><div class="v">+${xp}</div><div class="k">XP</div></div>
      <div class="medal acc"><div class="v">${acc}%</div><div class="k">정확도</div></div>
      <div class="medal stk"><div class="v">${isKM?`🈴${kmN}/5`:`🔥${S.streak}`}</div><div class="k">${isKM?'한자 마스터':'연속 학습'}</div></div>
    </div>
    ${isKM&&first?`<p style="color:var(--gold);font-weight:800">⭕ 원이 ${kmN}/5만큼 채워졌어요!</p>`:''}
    ${isKM&&kmN===5?`<p style="color:var(--gold);font-weight:800">👑 한자 완전 정복 달성! 78단어 마스터!</p>`:''}
    ${newDay?`<p style="color:var(--beak);font-weight:800">🔥 연속 학습 ${S.streak}일째!</p>`:''}
    ${xpToday()>=DAILY_GOAL?`<p style="color:var(--gold);font-weight:800">🎯 오늘의 목표 달성!</p>`:''}
    <div style="width:100%;max-width:320px;margin-top:14px">
      <button class="btn green" id="home">계속하기</button>
    </div>
  </div>`;
  document.getElementById('home').onclick=isKM?renderKanjiHub:()=>{focusId=L.id;renderHome();};
}

(async()=>{ await loadState(); await saveState(); renderHome(); })();
</script>
